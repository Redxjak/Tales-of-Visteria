name: Suggestion
description: Share an idea for Tales of Visteria.
title: "[Suggestion]: "
labels: ["suggestion"]
body:
  - type: markdown
    attributes:
      value: "Thanks for helping shape Tales of Visteria."
  - type: textarea
    id: suggestion
    attributes:
      label: What would you like to see?
      description: Describe the new feature, content, balance change, or quality-of-life improvement.
      placeholder: "Example: Add a way to inspect enemy health before choosing an attack."
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why would this help?
      description: Tell us what problem it solves or what it would make more fun.
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Game version
      placeholder: "Example: v0.8.1"
    validations:
      required: false
